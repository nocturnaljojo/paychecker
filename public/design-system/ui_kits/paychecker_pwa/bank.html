<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PayChecker — Bank deposit upload (Bucket E)</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel" src="YourData.jsx"></script>
  <script type="text/babel" src="Payslip.jsx"></script>
  <script type="text/babel" src="Classify.jsx"></script>
  <script type="text/babel" src="Bank.jsx"></script>

  <script type="text/babel">
    const PhoneFrame = ({ children, overlay }) => (
      <div style={{
        width: 390, height: 780, background: "#FAF7F2",
        borderRadius: 42, overflow: "hidden", position: "relative",
        boxShadow: "0 20px 50px rgba(26,29,36,0.18), 0 2px 8px rgba(26,29,36,0.06)",
        border: "10px solid #1A1D24",
        display: "flex", flexDirection: "column",
      }}>
        <div style={{
          height: 38, display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 22px", font: "600 14px 'IBM Plex Sans'", color: "#1A1D24", background: "#FAF7F2",
        }}>
          <span>9:41</span>
          <span style={{ fontSize: 12, color: "#6B7280" }}>●●●●  ●●●  100%</span>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
          {children}
          {overlay}
        </div>
      </div>
    );

    const noop = () => {};

    const ScrolledRowSelection = ({ scrollTo = 1400 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => { if (ref.current) ref.current.scrollTop = scrollTo; }, [scrollTo]);
      return (
        <>
          <TopBar title="Confirm deposits" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
          <div ref={ref} style={{ flex: 1, overflowY: "auto" }}>
            <BankRowSelection onSave={noop} onCancel={noop} onShowSource={noop}/>
          </div>
        </>
      );
    };

    // Pick example rows for source-preview variants
    const fuzzyRow = SAMPLE_BANK_STATEMENT.rows.find(r => r.match === "fuzzy");
    const otherRow = SAMPLE_BANK_STATEMENT.rows.find(r => r.description === "TRANSFER FROM SAVINGS");

    // Wrong-bucket banner — reuses classification safety net pattern
    const WrongBucketBannerForBank = () => (
      <div style={{ margin: "8px 16px 0", padding: "12px 14px", background: "#FBF1DB", border: "1px solid #E8B04B", borderRadius: 12, display: "flex", gap: 10, alignItems: "flex-start" }}>
        <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", color: "#7A5A1E", flexShrink: 0 }}>
          <Icon name="info" size={14} strokeWidth={2.5}/>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ font: "500 13px 'IBM Plex Sans'", color: "#7A5A1E", marginBottom: 2 }}>
            This looks like a payslip, not a bank statement.
          </div>
          <div style={{ font: "400 12px/1.45 'IBM Plex Sans'", color: "#7A5A1E", opacity: 0.9, marginBottom: 8, textWrap: "pretty" }}>
            We spotted "Gross Pay" and an employer letterhead. Want to move it to the right bucket?
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ padding: "6px 12px", background: "#7A5A1E", color: "#fff", border: 0, borderRadius: 8, font: "500 12px 'IBM Plex Sans'", cursor: "pointer" }}>Move to Payslips</button>
            <button style={{ padding: "6px 12px", background: "transparent", color: "#7A5A1E", border: "1px solid #E8B04B", borderRadius: 8, font: "500 12px 'IBM Plex Sans'", cursor: "pointer" }}>Keep here</button>
          </div>
        </div>
      </div>
    );

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="bucket-e" title="Bucket E · Bank deposit upload"
            subtitle="Clones the Bucket D row-selection pattern. The bank statement is the most sensitive document a worker uploads — rent, groceries, medical, savings. Strong privacy copy up front. Default-check rows whose description contains the confirmed employer name (exact or fuzzy). Everything else stays on device, discarded at save. Saved screen unlocks Comparison 5 — Bank reconciliation.">

            <DCArtboard id="e1" label="1 · Upload choice" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Add statement" left={<IconButton icon="chevronL" ariaLabel="Back"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <BankUploadChoice onPick={noop} onBack={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="e2a" label="2 · Row selection (top — privacy + employer group)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Confirm deposits" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <BankRowSelection onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="e2b" label="2 · Row selection (scrolled — other transactions + summary)" width={410} height={800}>
              <PhoneFrame><ScrolledRowSelection scrollTo={1700}/></PhoneFrame>
            </DCArtboard>

            <DCArtboard id="e2c" label="2 · Source provenance (fuzzy match deposit)" width={410} height={800}>
              <PhoneFrame overlay={<BankSourceSheet row={fuzzyRow} onClose={noop}/>}>
                <TopBar title="Confirm deposits" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <BankRowSelection onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="e2d" label="2 · Source provenance (other transaction — incoming, not employer)" width={410} height={800}>
              <PhoneFrame overlay={<BankSourceSheet row={otherRow} onClose={noop}/>}>
                <TopBar title="Confirm deposits" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <BankRowSelection onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="e2e" label="2 · Wrong-bucket safety net (classification flagged it)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Confirm deposits" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <WrongBucketBannerForBank/>
                  <BankRowSelection onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="e3" label="3 · Saved — bank reconciliation unlocked" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Saved"/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <BankSavedScreen onSeeComparison={noop} onBack={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>
          </DCSection>

          <DCPostIt top={20} left={20} width={260}>
            <strong>Privacy is the headline</strong><br/>
            A bank statement reveals far more than super or payslips — rent, medical, savings, who you Venmo. The dark-blue privacy callout sits both on upload choice AND row selection so the message can't be missed.
          </DCPostIt>
          <DCPostIt top={210} left={20} width={260} rotate={1.5}>
            <strong>Default-check rule</strong><br/>
            Row description contains confirmed employer name. Exact = green "Employer deposit". Fuzzy (abbreviation, partial) = blue "Likely employer". Both default-checked. Everything else = amber "Other transaction", default-unchecked.
          </DCPostIt>
          <DCPostIt top={400} left={20} width={260} rotate={-1.2}>
            <strong>Two visual groups</strong><br/>
            "Deposits from [employer]" sits at the top so it's never lost in chrome. "Other transactions · not saved" follows — visible (so you can rescue a missed wage) but clearly framed as throwaway.
          </DCPostIt>
          <DCPostIt top={590} left={20} width={260} rotate={0.7}>
            <strong>Reconciliation unlock</strong><br/>
            Comparison 5 (net pay vs deposits) needs both a payslip AND a bank statement to work. The saved screen leads with this — "Bank reconciliation now possible" — and shows 4 → 5 of 7 comparisons.
          </DCPostIt>
          <DCPostIt top={780} left={20} width={260} rotate={-0.5}>
            <strong>Wrong-bucket safety net</strong><br/>
            Classification screen catches mis-uploads up front, but if a worker drops a payslip into the bank flow anyway, an amber banner appears above row selection offering one-tap move. Reuses the Classify pattern.
          </DCPostIt>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
