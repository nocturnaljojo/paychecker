<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PayChecker — Onboarding (Workflow A)</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel" src="Onboarding.jsx"></script>

  <script type="text/babel">
    const PhoneFrame = ({ children }) => (
      <div style={{
        width: 390, height: 780, background: "#FAF7F2",
        borderRadius: 42, overflow: "hidden", position: "relative",
        boxShadow: "0 20px 50px rgba(26,29,36,0.18), 0 2px 8px rgba(26,29,36,0.06)",
        border: "10px solid #1A1D24",
        display: "flex", flexDirection: "column",
      }}>
        <div style={{
          height: 38, display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 22px", font: "600 14px 'IBM Plex Sans'", color: "#1A1D24", background: "#FAF7F2",
        }}>
          <span>9:41</span>
          <span style={{ fontSize: 12, color: "#6B7280" }}>●●●●  ●●●  100%</span>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {children}
        </div>
      </div>
    );

    const noop = () => {};
    const DEMO = { name: "Apete", country: "Tonga", language: "English" };

    function StepAt({ step }) {
      const [data, setData] = React.useState(DEMO);
      if (step === 1) return <Obv2Welcome onNext={noop} onReturn={noop} onSkip={noop}/>;
      if (step === 2) return <Obv2What onBack={noop} onNext={noop} onSkip={noop}/>;
      if (step === 3) return <Obv2Share onBack={noop} onNext={noop} onSkip={noop}/>;
      if (step === 4) return <Obv2Control onBack={noop} onNext={noop} onSkip={noop}/>;
      if (step === 5) return <Obv2Isnt onBack={noop} onNext={noop} onSkip={noop}/>;
      if (step === 6) return <Obv2Consent data={data} setData={setData} onBack={noop} onComplete={noop} onSkip={noop}/>;
      return null;
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="onboarding-a" title="Onboarding · Workflow A"
            subtitle="Six educational screens. Orient, don't collect. Data entry happens later via 'Your data' bucket uploads.">
            <DCArtboard id="s1" label="1 · Welcome"                width={410} height={800}><PhoneFrame><StepAt step={1}/></PhoneFrame></DCArtboard>
            <DCArtboard id="s2" label="2 · What this app does"     width={410} height={800}><PhoneFrame><StepAt step={2}/></PhoneFrame></DCArtboard>
            <DCArtboard id="s3" label="3 · What you'll share"      width={410} height={800}><PhoneFrame><StepAt step={3}/></PhoneFrame></DCArtboard>
            <DCArtboard id="s4" label="4 · Your control"           width={410} height={800}><PhoneFrame><StepAt step={4}/></PhoneFrame></DCArtboard>
            <DCArtboard id="s5" label="5 · What this app isn't"    width={410} height={800}><PhoneFrame><StepAt step={5}/></PhoneFrame></DCArtboard>
            <DCArtboard id="s6" label="6 · Consent + profile"      width={410} height={800}><PhoneFrame><StepAt step={6}/></PhoneFrame></DCArtboard>
          </DCSection>

          <DCPostIt x={20} y={20} width={260}>
            <strong>Orient, don't collect</strong><br/>
            No employer / classification / rate / deductions forms. Layer 1 facts get captured later via contract upload or manual entry.
          </DCPostIt>
          <DCPostIt x={20} y={180} width={260} color="#d6e9d9">
            <strong>After onboarding</strong><br/>
            Lands on "Your data" bucket status screen with all buckets empty and clear Upload CTAs. Data collection is ongoing, not front-loaded.
          </DCPostIt>
          <DCPostIt x={20} y={340} width={260} color="#f4e2b8">
            <strong>Graceful degradation</strong><br/>
            Skip on every step. Consent + name required on screen 6; country and language default to blank/English.
          </DCPostIt>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
