<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PayChecker — Payslip processing (Workflow C)</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel" src="YourData.jsx"></script>
  <script type="text/babel" src="Payslip.jsx"></script>

  <script type="text/babel">
    const PhoneFrame = ({ children, overlay }) => (
      <div style={{
        width: 390, height: 780, background: "#FAF7F2",
        borderRadius: 42, overflow: "hidden", position: "relative",
        boxShadow: "0 20px 50px rgba(26,29,36,0.18), 0 2px 8px rgba(26,29,36,0.06)",
        border: "10px solid #1A1D24",
        display: "flex", flexDirection: "column",
      }}>
        <div style={{
          height: 38, display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 22px", font: "600 14px 'IBM Plex Sans'", color: "#1A1D24", background: "#FAF7F2",
        }}>
          <span>9:41</span>
          <span style={{ fontSize: 12, color: "#6B7280" }}>●●●●  ●●●  100%</span>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
          {children}
          {overlay}
        </div>
      </div>
    );

    const noop = () => {};

    // Screen 2 scrolled to show bottom rows (deductions + actions)
    const ExtractionBottom = () => {
      const ref = React.useRef(null);
      React.useEffect(() => { if (ref.current) ref.current.scrollTop = 900; }, []);
      return (
        <>
          <TopBar title="Check details" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
          <div ref={ref} style={{ flex: 1, overflowY: "auto" }}>
            <ExtractionPreviewScreen onSave={noop} onCancel={noop} onShowSource={noop}/>
          </div>
        </>
      );
    };

    const provField = SAMPLE_EXTRACTION.fields.find(f => f.key === "hourlyRate");

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="workflow-c" title="Workflow C · Payslip processing"
            subtitle="Extract-and-confirm: read, show, confirm, delete photo, save numbers. Nothing enters the calculation pipeline until the worker confirms.">
            <DCArtboard id="c1" label="1 · Upload choice" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Add payslip" left={<IconButton icon="chevronL" ariaLabel="Back"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <UploadChoiceScreen onPick={noop} onBack={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="c2a" label="2 · Extraction preview (top)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Check details" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ExtractionPreviewScreen onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="c2b" label="2 · Extraction preview (scrolled)" width={410} height={800}>
              <PhoneFrame><ExtractionBottom/></PhoneFrame>
            </DCArtboard>

            <DCArtboard id="c2c" label="2 · Source provenance" width={410} height={800}>
              <PhoneFrame overlay={<SourcePreviewSheet field={SAMPLE_EXTRACTION.fields.find(f => f.key === "grossPay")} onClose={noop}/>}>
                <TopBar title="Check details" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ExtractionPreviewScreen onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="c3" label="3 · Saved" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Saved"/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ExtractionSavedScreen onSeeComparison={noop} onBack={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="c4" label="4 · Field provenance sheet" width={410} height={800}>
              <PhoneFrame overlay={<FieldProvenanceSheet field={provField} onClose={noop} onEdit={noop} onDelete={noop} onReport={noop}/>}>
                <TopBar title="Check details" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ExtractionPreviewScreen onSave={noop} onCancel={noop} onShowSource={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>
          </DCSection>

          <DCPostIt top={20} left={20} width={260}>
            <strong>Extract-and-confirm</strong><br/>
            Raw image kept only until the worker confirms. Then: extracted values saved, photo deleted. Nothing enters the comparison pipeline before confirmation.
          </DCPostIt>
          <DCPostIt top={200} left={20} width={260} rotate={1.5}>
            <strong>Low ≠ wrong, low = "check"</strong><br/>
            Low-confidence values use amber, never red. They're highlighted so workers know what to look at — not told something is broken.
          </DCPostIt>
          <DCPostIt top={380} left={20} width={260} rotate={-1.5}>
            <strong>Reused for D &amp; E</strong><br/>
            Super statements (D) and bank deposits (E) use the same pattern, with row-selection — only employer-related rows are saved, non-employer rows discarded client-side.
          </DCPostIt>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
