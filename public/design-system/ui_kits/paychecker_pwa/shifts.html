<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PayChecker — Shift logging (Workflow B)</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Shifts.jsx"></script>

  <script type="text/babel">
    const PhoneFrame = ({ children }) => (
      <div style={{
        width: 390, height: 780, background: "#FAF7F2",
        borderRadius: 42, overflow: "hidden", position: "relative",
        boxShadow: "0 20px 50px rgba(26,29,36,0.18), 0 2px 8px rgba(26,29,36,0.06)",
        border: "10px solid #1A1D24",
        display: "flex", flexDirection: "column",
      }}>
        <div style={{
          height: 38, display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 22px", font: "600 14px 'IBM Plex Sans'", color: "#1A1D24", background: "#FAF7F2",
        }}>
          <span>9:41</span>
          <span style={{ fontSize: 12, color: "#6B7280" }}>●●●●  ●●●  100%</span>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
          {children}
        </div>
      </div>
    );

    const noop = () => {};

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="workflow-b" title="Workflow B · Shift logging"
            subtitle="Daily action. <10 taps to save a shift. Auto-infer everything we can (overnight, day/night, public holiday) and let workers override.">

            <DCArtboard id="b1" label="1 · Shift list (grouped by week)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Shifts" right={<IconButton icon="user" ariaLabel="Account"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ShiftsListScreen onOpenShift={noop} onLog={noop} onBatch={noop}/>
                </div>
                <TabBar active="shifts" onChange={noop}/>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="b1e" label="1a · Empty state (first week)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Shifts"/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ShiftsListScreen shifts={[]} onLog={noop} onBatch={noop}/>
                </div>
                <TabBar active="shifts" onChange={noop}/>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="b2" label="2 · Log a shift" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Log shift" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <LogShiftScreen onSave={noop} onSaveAndNext={noop} onCancel={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="b2ph" label="2a · PH auto-detected" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Log shift" left={<IconButton icon="x" ariaLabel="Cancel"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <LogShiftScreen onSave={noop} onSaveAndNext={noop} onCancel={noop}
                    defaults={{ date: "2026-04-25", start: "11:00", end: "19:00", breakMin: 30 }}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="b3" label="3 · Batch entry (week grid)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Log multiple" left={<IconButton icon="chevronL" ariaLabel="Back"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <BatchEntryScreen onSave={noop} onCancel={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="b4" label="4 · Shift detail (diff)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Shift" left={<IconButton icon="chevronL" ariaLabel="Back"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ShiftDetailScreen shift={SAMPLE_SHIFTS.find(s => s.status === "diff")}
                    onBack={noop} onEdit={noop} onDelete={noop} onNeverHappened={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

            <DCArtboard id="b4m" label="4a · Shift detail (match)" width={410} height={800}>
              <PhoneFrame>
                <TopBar title="Shift" left={<IconButton icon="chevronL" ariaLabel="Back"/>}/>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  <ShiftDetailScreen shift={SAMPLE_SHIFTS.find(s => s.status === "match")}
                    onBack={noop} onEdit={noop} onDelete={noop} onNeverHappened={noop}/>
                </div>
              </PhoneFrame>
            </DCArtboard>

          </DCSection>

          <DCPostIt top={20} left={20} width={260}>
            <strong>Low friction is non-negotiable</strong><br/>
            Daily habit. Target under 10 taps to save a shift. FAB always reachable. Save-and-next for back-to-back days.
          </DCPostIt>
          <DCPostIt top={200} left={20} width={260} rotate={1.5}>
            <strong>Auto-infer, let them override</strong><br/>
            Overnight (end &lt; start), day/night (start time), public holidays (AU 2026 table). All visible. All editable. Never silent.
          </DCPostIt>
          <DCPostIt top={380} left={20} width={260} rotate={-1.5}>
            <strong>Batch catch-up</strong><br/>
            Workers forget. The week-grid is for "I haven't logged in 5 days" — tap a day, enter times, move on. Same times often repeat so start/end remember.
          </DCPostIt>
          <DCPostIt top={560} left={20} width={260} rotate={1}>
            <strong>Status inline, not a toast</strong><br/>
            "Matches payslip" / "+$43.55" render on the row. No separate inbox, no interrupting notification — shifts are the ground truth, payslips compare against them.
          </DCPostIt>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
