<!DOCTYPE html><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; gap: 12px; }
  .item { display: grid; grid-template-columns: 56px 1fr auto; align-items: center; gap: 16px; }
  .chip { width: 56px; height: 36px; border-radius: 10px; border: 1px solid var(--pc-border); }
  .name { font-weight: 600; font-size: 14px; }
  .role { font-size: 12px; color: var(--pc-text-muted); margin-top: 1px; }
  .hex  { font-family: var(--pc-font-mono); font-size: 13px; color: var(--pc-text-muted); }
</style></head><body><div class="card">
  <div class="item"><div class="chip" style="background:#FAF7F2"></div>
    <div><div class="name">Background</div><div class="role">Warm off-white · page</div></div><div class="hex">#FAF7F2</div></div>
  <div class="item"><div class="chip" style="background:#FFFFFF"></div>
    <div><div class="name">Surface</div><div class="role">Cards · on top of bg</div></div><div class="hex">#FFFFFF</div></div>
  <div class="item"><div class="chip" style="background:#E5E1D8"></div>
    <div><div class="name">Border</div><div class="role">Soft warm grey · 1px</div></div><div class="hex">#E5E1D8</div></div>
  <div class="item"><div class="chip" style="background:#6B7280"></div>
    <div><div class="name">Muted text</div><div class="role">Labels · captions · metadata</div></div><div class="hex">#6B7280</div></div>
  <div class="item"><div class="chip" style="background:#1A1D24"></div>
    <div><div class="name">Text</div><div class="role">Charcoal · never pure black</div></div><div class="hex">#1A1D24</div></div>
</div></body></html>
