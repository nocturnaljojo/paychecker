<!DOCTYPE html><html><head><meta charset="utf-8"><title>Plex Mono — numbers</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; gap: 12px; justify-content: center; }
  .row4 { display: grid; grid-template-columns: 160px 1fr auto; align-items: baseline; gap: 18px; }
  .lbl { font-size: 13px; color: var(--pc-text-muted); }
  .val { font-family: 'IBM Plex Mono'; font-variant-numeric: tabular-nums; font-size: 28px; font-weight: 500; color: var(--pc-text); letter-spacing: -0.01em; }
  .diff-amber { color: #7A5A1E; }
  .diff-sage  { color: #385944; }
  .foot { font-size: 12px; color: var(--pc-text-muted); font-family: var(--pc-font-mono); margin-top: 4px; }
</style></head><body><div class="card">
  <div class="row4"><span class="lbl">Expected</span><span class="val">$1,247.60</span><span></span></div>
  <div class="row4"><span class="lbl">Received</span><span class="val">$1,200.00</span><span></span></div>
  <div class="row4"><span class="lbl">Difference</span><span class="val diff-amber">$47.60</span><span></span></div>
  <div class="foot">IBM Plex Mono · tabular-nums — every digit sits on the same column. Columns align.</div>
</div></body></html>
