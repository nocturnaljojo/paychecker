<!DOCTYPE html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; justify-content: center; gap: 16px; }
  .row6 { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .shape { background: #FFFFFF; border: 1px solid #E5E1D8; width: 80px; height: 56px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--pc-text-muted); }
  .cap { font-size: 12px; color: var(--pc-text-muted); text-align: center; margin-top: 6px; font-family: var(--pc-font-mono); }
  .col2 { display: flex; flex-direction: column; align-items: center; }
</style></head><body><div class="card">
  <div class="row6">
    <div class="col2"><div class="shape" style="border-radius:12px">12</div><div class="cap">Input · Button</div></div>
    <div class="col2"><div class="shape" style="border-radius:16px">16</div><div class="cap">Card</div></div>
    <div class="col2"><div class="shape" style="border-radius:20px">20</div><div class="cap">Pill · min</div></div>
    <div class="col2"><div class="shape" style="border-radius:9999px">∞</div><div class="cap">Pill · fully rounded</div></div>
  </div>
</div></body></html>
