<!DOCTYPE html><html><head><meta charset="utf-8"><title>Plex Serif — PDF only</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px; justify-content: center; gap: 10px; }
  .doc {
    background: #fff; border-radius: 10px; border: 1px solid var(--pc-border);
    padding: 22px 26px; font-family: 'IBM Plex Serif'; color: var(--pc-text);
  }
  .doc h1 { font: 600 22px/1.3 'IBM Plex Serif'; margin: 0 0 6px; }
  .doc .meta { font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--pc-text-muted); margin-bottom: 10px; }
  .doc p { font: 400 14px/1.6 'IBM Plex Serif'; margin: 0; }
  .note { font-size: 12px; color: var(--pc-text-muted); font-family: var(--pc-font-sans); }
</style></head><body><div class="card">
  <div class="doc">
    <h1>Pay comparison — week ending 14 Mar 2026</h1>
    <div class="meta">Report generated by PayChecker · for your records</div>
    <p>This document summarises the difference between expected pay and received pay for the period above, with source calculations attached.</p>
  </div>
  <div class="note">IBM Plex Serif — PDF reports only. Signals "document" vs "app screen".</div>
</div></body></html>
