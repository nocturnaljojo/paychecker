<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; gap: 10px; justify-content: center; }
  .row5 { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 14px; height: 22px; }
  .tok { font-family: var(--pc-font-mono); font-size: 12px; color: var(--pc-text-muted); }
  .bar { background: #1F3A5F; height: 14px; border-radius: 3px; }
  .px  { font-family: var(--pc-font-mono); font-size: 12px; color: var(--pc-text-muted); }
</style></head><body><div class="card">
  <div class="row5"><span class="tok">1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row5"><span class="tok">2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row5"><span class="tok">3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row5"><span class="tok">4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row5"><span class="tok">6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row5"><span class="tok">8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row5"><span class="tok">12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row5"><span class="tok">16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row5"><span class="tok">24</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</div></body></html>
