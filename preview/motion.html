<!DOCTYPE html><html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; gap: 14px; justify-content: center; }
  .row8 { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
  .curve { width: 140px; height: 90px; border: 1px solid var(--pc-border); border-radius: 10px; background: #FFFFFF; position: relative; }
  .curve svg { width: 100%; height: 100%; }
  .label-m { font-size: 13px; color: var(--pc-text); margin-top: 8px; font-weight: 500; }
  .sub { font-size: 12px; color: var(--pc-text-muted); font-family: var(--pc-font-mono); }
  .col3 { display: flex; flex-direction: column; align-items: flex-start; }
  .rules { font-size: 13px; color: var(--pc-text-muted); line-height: 1.5; }
</style></head><body><div class="card">
  <div class="row8">
    <div class="col3">
      <div class="curve">
        <svg viewBox="0 0 140 90" fill="none">
          <path d="M5,80 C40,80 60,10 135,10" stroke="#1F3A5F" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="5" cy="80" r="3" fill="#1F3A5F"/>
          <circle cx="135" cy="10" r="3" fill="#1F3A5F"/>
        </svg>
      </div>
      <div class="label-m">Ease-out</div>
      <div class="sub">cubic-bezier(0.2, 0.6, 0.2, 1)</div>
    </div>
    <div class="rules">
      Durations: <span class="sub">150 · 240 · 320ms</span><br>
      Page loads: one orchestrated reveal.<br>
      <span style="color:#7A3B33">Forbidden:</span> springs, bounce, confetti, pulse, hover wiggle.
    </div>
  </div>
</div></body></html>
