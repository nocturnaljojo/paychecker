<!DOCTYPE html><html><head><meta charset="utf-8"><title>Plex Sans</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; gap: 14px; justify-content: center; }
  .big { font: 600 44px/1.1 'IBM Plex Sans'; letter-spacing: -0.015em; color: var(--pc-text); }
  .meta { display: flex; gap: 24px; flex-wrap: wrap; }
  .meta span { font-size: 12px; color: var(--pc-text-muted); font-family: var(--pc-font-mono); }
  .sample { font: 400 16px/1.5 'IBM Plex Sans'; color: var(--pc-text); }
  .weights { display: flex; gap: 18px; align-items: baseline; }
  .w { font-size: 20px; }
  .w400 { font-weight: 400; } .w500 { font-weight: 500; } .w600 { font-weight: 600; }
</style></head><body><div class="card">
  <div class="big">IBM Plex Sans</div>
  <div class="weights">
    <span class="w w400">Regular 400</span>
    <span class="w w500">Medium 500</span>
    <span class="w w600">Semibold 600</span>
  </div>
  <div class="sample">All UI text — headings, body, labels, buttons. Calm and direct.</div>
  <div class="meta"><span>--pc-font-sans</span><span>weights 400 / 500 / 600</span><span>no italic</span></div>
</div></body></html>
