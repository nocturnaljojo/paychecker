<!DOCTYPE html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; gap: 10px; justify-content: center; }
  .row3 { display: grid; grid-template-columns: auto 1fr auto; align-items: baseline; gap: 20px; padding: 4px 0; }
  .name { color: var(--pc-text-muted); font-size: 12px; font-family: var(--pc-font-mono); letter-spacing: 0.04em; text-transform: uppercase; min-width: 72px; }
  .spec { color: var(--pc-text-muted); font-size: 12px; font-family: var(--pc-font-mono); }
  .s-d  { font: 600 32px/1.1 'IBM Plex Sans'; letter-spacing: -0.01em; }
  .s-h1 { font: 600 24px/1.3 'IBM Plex Sans'; }
  .s-h2 { font: 600 20px/1.3 'IBM Plex Sans'; }
  .s-b  { font: 400 16px/1.5 'IBM Plex Sans'; }
  .s-c  { font: 400 14px/1.5 'IBM Plex Sans'; }
  .s-m  { font: 400 13px/1.5 'IBM Plex Sans'; }
</style></head><body><div class="card">
  <div class="row3"><span class="name">Display</span><span class="s-d">Your pay this week</span><span class="spec">32 / 600</span></div>
  <div class="row3"><span class="name">H1</span><span class="s-h1">Sunday penalty rates</span><span class="spec">24 / 600</span></div>
  <div class="row3"><span class="name">H2</span><span class="s-h2">Shift breakdown</span><span class="spec">20 / 600</span></div>
  <div class="row3"><span class="name">Body</span><span class="s-b">Upload your payslip and we'll compare it line by line.</span><span class="spec">16 / 400</span></div>
  <div class="row3"><span class="name">Caption</span><span class="s-c">Last checked 2 hours ago</span><span class="spec">14 / 400</span></div>
  <div class="row3"><span class="name">Micro</span><span class="s-m">For questions, Fair Work Ombudsman: 13 13 94</span><span class="spec">13 / 400</span></div>
</div></body></html>
